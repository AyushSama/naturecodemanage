<div class="p-6">
  <h2 class="text-lg font-bold text-gray-900">Add Student</h2>
  <p class="text-sm text-gray-500 mt-0.5 mb-5">Register a new student</p>

  <div class="space-y-4">
    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Email</label>
      <input type="email" [(ngModel)]="email" placeholder="student@example.com"
             class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-900 placeholder:text-gray-300
                    focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition" />
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Full Name</label>
      <input type="text" [(ngModel)]="name" placeholder="John Doe"
             class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-900 placeholder:text-gray-300
                    focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition" />
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Initial Sessions</label>
      <input type="number" [(ngModel)]="sessions" min="0"
             class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm text-gray-900 placeholder:text-gray-300
                    focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition" />
    </div>
  </div>

  <div class="flex justify-end gap-2 mt-6">
    <button (click)="modalClose()"
            class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition cursor-pointer">
      Cancel
    </button>
    <button (click)="save()" [disabled]="saving() || !email || !name"
            class="px-4 py-2 text-sm font-medium text-white bg-green-600 hover:bg-green-700 rounded-lg transition
                   disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer">
      {{ saving() ? 'Saving...' : 'Add Student' }}
    </button>
  </div>
</div>
