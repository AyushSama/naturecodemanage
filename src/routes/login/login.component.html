<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-green-100 via-green-50 to-emerald-100 relative overflow-hidden">
  <!-- Decorative floating circles -->
  <div class="absolute top-[-80px] left-[-80px] w-64 h-64 bg-green-200/40 rounded-full animate-pulse"></div>
  <div class="absolute bottom-[-60px] right-[-60px] w-80 h-80 bg-green-100/50 rounded-full animate-pulse" style="animation-delay: 1s"></div>
  <div class="absolute top-1/3 right-[-40px] w-48 h-48 bg-emerald-200/30 rounded-full animate-pulse" style="animation-delay: 2s"></div>

  <!-- Login card -->
  <div class="z-10 bg-white rounded-2xl shadow-xl p-10 w-[400px] max-w-[90vw] text-center border border-gray-100">
    <!-- NatureCode branding -->
    <div class="w-16 h-16 mx-auto mb-4 bg-gradient-to-br from-green-500 to-green-700 rounded-2xl flex items-center justify-center shadow-lg rotate-3 hover:rotate-0 transition-transform duration-300">
      <span class="text-white text-2xl font-bold">N</span>
    </div>
    <h1 class="text-2xl font-bold text-gray-900">Nature<span class="text-green-600">Code</span></h1>
    <p class="text-gray-500 mt-1 text-sm">Sign in to manage your sessions</p>

    <div class="flex items-center gap-3 my-6">
      <div class="flex-1 h-px bg-gray-200"></div>
      <span class="text-xs text-gray-400 uppercase tracking-widest">Continue with</span>
      <div class="flex-1 h-px bg-gray-200"></div>
    </div>

    <!-- Google Sign-In button container -->
    <div class="flex justify-center">
      <div #googleBtn></div>
    </div>

    <p class="mt-6 text-xs text-gray-400">Secure login powered by Google</p>
  </div>
</div>
