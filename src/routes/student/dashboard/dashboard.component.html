<div class="max-w-3xl mx-auto px-4 py-6 sm:py-8">
  <!-- Loading State -->
  @if (loading()) {
    <div class="flex items-center justify-center py-20">
      <div class="w-8 h-8 border-4 border-green-500 border-t-transparent rounded-full animate-spin"></div>
    </div>
  }

  @if (!loading() && profile(); as p) {
    <!-- Welcome -->
    <h1 class="text-2xl font-bold text-gray-900 mb-6">
      Welcome back, <span class="text-green-700">{{ p.name }}</span>
    </h1>

    <!-- Stat Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
      <!-- Sessions Remaining -->
      <div class="bg-white rounded-2xl shadow p-6 border border-gray-100">
        <p class="text-sm font-medium text-gray-500 mb-1">Sessions Remaining</p>
        <p class="text-4xl font-extrabold"
           [class]="p.sessionsRemaining === 0 ? 'text-red-600' : 'text-green-700'">
          {{ p.sessionsRemaining }}
        </p>
      </div>

      <!-- Total Paid -->
      <div class="bg-white rounded-2xl shadow p-6 border border-gray-100">
        <p class="text-sm font-medium text-gray-500 mb-1">Total Paid</p>
        <p class="text-4xl font-extrabold text-gray-900">
          {{ p.totalPaid | currency:'INR':'symbol':'1.0-0' }}
        </p>
      </div>
    </div>

    <!-- Mark Attendance CTA -->
    <div class="bg-green-50 rounded-2xl shadow p-6 border border-green-200 text-center">
      <h2 class="text-lg font-semibold text-green-800 mb-2">Ready for today's session?</h2>
      <p class="text-sm text-green-600 mb-4">Tap below to mark your attendance for today.</p>
      <button
        (click)="markAttendance()"
        [disabled]="marking()"
        class="inline-flex items-center gap-2 bg-green-600 hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold px-8 py-3 rounded-xl transition">
        @if (marking()) {
          <span class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
          Marking...
        } @else {
          Mark Attendance
        }
      </button>
    </div>
  }
</div>
