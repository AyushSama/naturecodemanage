@if (modal.isOpen()) {
  <div class="fixed inset-0 z-[1000] flex items-center justify-center">
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm animate-fade-in"
         (click)="onBackdropClick()"></div>
    <!-- Modal Card -->
    <div class="relative z-10 bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 animate-scale-in overflow-hidden">
      <ng-container #outlet></ng-container>
    </div>
  </div>
}
