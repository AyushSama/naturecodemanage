@if (toast.toast(); as t) {
  <div class="fixed bottom-6 right-6 z-[2000] animate-slide-up">
    <div class="px-5 py-3 rounded-xl shadow-lg text-white text-sm font-medium flex items-center gap-2"
         [class]="t.type === 'success' ? 'bg-primary-600' : t.type === 'error' ? 'bg-red-500' : 'bg-blue-500'">
      {{ t.message }}
    </div>
  </div>
}
