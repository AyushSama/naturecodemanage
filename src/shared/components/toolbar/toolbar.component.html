<header class="h-14 bg-white border-b border-gray-200 flex items-center px-6 sticky top-0 z-50 shadow-sm">
  <div class="flex items-center gap-2.5">
    <div class="w-8 h-8 bg-gradient-to-br from-primary-500 to-primary-700 rounded-lg flex items-center justify-center shadow">
      <span class="text-white text-xs font-bold">N</span>
    </div>
    <span class="text-base font-semibold text-gray-900 font-inter">
      Nature<span class="text-primary-600">Code</span>
    </span>
  </div>

  <span class="flex-1"></span>

  @if (auth.currentUser(); as user) {
    <div class="flex items-center gap-3">
      <span class="px-2.5 py-0.5 rounded-full text-[10px] font-bold tracking-wider uppercase bg-primary-100 text-primary-700">
        {{ user.role }}
      </span>

      <!-- Profile link -->
      <a routerLink="/profile"
         class="flex items-center gap-2 hover:bg-gray-50 rounded-lg px-2 py-1 transition-colors cursor-pointer">
        <div class="w-7 h-7 rounded-full bg-primary-500 flex items-center justify-center text-white text-xs font-bold">
          {{ user.name.charAt(0) | uppercase }}
        </div>
        <span class="text-sm font-medium text-gray-700 hidden sm:inline">{{ user.name }}</span>
      </a>

      <button (click)="auth.signOut()"
              class="p-1.5 rounded-lg text-gray-400 hover:text-red-500 hover:bg-red-50 transition-all cursor-pointer"
              title="Sign out">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
      </button>
    </div>
  }
</header>
